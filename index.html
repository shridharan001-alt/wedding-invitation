<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shridharan & Jeevika - Wedding Invitation</title>

<script>
(function () {
  const screenWidth = window.innerWidth;
  const userAgent = navigator.userAgent.toLowerCase();

  const isMobile =
    screenWidth <= 768 ||
    /android|iphone|ipod|blackberry|iemobile|opera mini/.test(userAgent);

  if (isMobile) {
    window.location.replace("mobile.html");
  } else {
    window.location.replace("desktop.html");
  }
})();
</script>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  font-family: Arial, sans-serif;
  background: #fff8ea;
  color: #082d47;
  text-align: center;
}

.card {
  padding: 2rem;
}

a {
  color: #147352;
  font-weight: bold;
}
</style>
</head>

<body>
  <div class="card">
    <h2>Shridharan & Jeevika</h2>
    <p>Opening wedding invitation...</p>

    <p>
      <a href="mobile.html">Open Mobile View</a> |
      <a href="desktop.html">Open Desktop View</a>
    </p>
  </div>
</body>
</html>
